---
- name: Test repository list in Semaphore
  hosts: localhost
  gather_facts: false
  vars:
    semaphore_host: "http://localhost"
    semaphore_port: 3000
    semaphore_username: "{{ lookup('env', 'ebdruplab_integration_test_USER') | default('admin', true) }}"
    semaphore_password: "{{ lookup('env', 'ebdruplab_integration_test_PW') | default('changeme', true) }}"
    repository1:
      name: "Repo A"
      git_url: "https://github.com/example/repo-a.git"
      git_branch: "main"
    repository2:
      name: "Repo B"
      git_url: "https://github.com/example/repo-b.git"
      git_branch: "main"
  tasks:
    - name: Log in to Semaphore
      ebdruplab.semaphoreui.login:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        username: "{{ semaphore_username }}"
        password: "{{ semaphore_password }}"
      register: login_result

    - name: Get projects
      ebdruplab.semaphoreui.project_list:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
      register: project_list

    - name: Ensure at least one project exists
      assert:
        that:
          - project_list.projects | length > 0

    - name: Create first repository
      ebdruplab.semaphoreui.repository_create:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ project_list.projects[0].id }}"
        repository: "{{ repository1 }}"
      register: created_repo1

    - name: Create second repository
      ebdruplab.semaphoreui.repository_create:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ project_list.projects[0].id }}"
        repository: "{{ repository2 }}"
      register: created_repo2

    - name: List all repositories in the project
      ebdruplab.semaphoreui.repository_list:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ project_list.projects[0].id }}"
      register: listed_repos

    - name: Show repositories
      debug:
        var: listed_repos.repositories

    - name: Delete repository 1
      ebdruplab.semaphoreui.repository_delete:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ project_list.projects[0].id }}"
        repository_id: "{{ created_repo1.repository.id }}"

    - name: Delete repository 2
      ebdruplab.semaphoreui.repository_delete:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ project_list.projects[0].id }}"
        repository_id: "{{ created_repo2.repository.id }}"

    - name: Log out
      ebdruplab.semaphoreui.logout:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
