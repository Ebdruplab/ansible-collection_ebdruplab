---
- name: Test create schedule
  hosts: localhost
  gather_facts: false
  vars:
    semaphore_host: "http://localhost"
    semaphore_port: 3000
    semaphore_username: "{{ lookup('env', 'ebdruplab_integration_test_USER') | default('admin', true) }}"
    semaphore_password: "{{ lookup('env', 'ebdruplab_integration_test_PW') | default('changeme', true) }}"
  tasks:
    - name: Log in to Semaphore
      ebdruplab.semaphoreui.login:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        username: "{{ semaphore_username }}"
        password: "{{ semaphore_password }}"
      register: login_result

    - name: Get list of projects
      ebdruplab.semaphoreui.project_list:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
      register: projects

    - name: Ensure at least one project exists
      ansible.builtin.assert:
        that:
          - projects.projects | length > 0

    - name: Get list of apps
      ebdruplab.semaphoreui.apps_list:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
      register: apps_result

    - name: Filter app with id == 'ansible'
      set_fact:
        ansible_app: "{{ apps_result.apps | selectattr('id', 'equalto', 'ansible') | list }}"

    - name: Assert that ansible app exists
      ansible.builtin.assert:
        that:
          - ansible_app | length > 0
        fail_msg: "No app with id 'ansible' found"


    - name: Set app_id from ansible_app
      set_fact:
        app_id: "{{ ansible_app[0].id }}"


    - name: Create a dummy template
      ebdruplab.semaphoreui.template_create:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ projects.projects[0].id }}"
        template:
          name: "Test Template"
          app_id: "{{ app_id }}"
          inventory_id: null
          repository_id: null
          environment_id: null
          playbook: "playbook.yml"
          type: "job"
          allow_override_args_in_task: false
          survey_vars: []
      register: created_template

    - name: Create a schedule
      ebdruplab.semaphoreui.schedule_create:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ projects.projects[0].id }}"
        schedule:
          cron_format: "* * * 1 *"
          template_id: "{{ created_template.template.id }}"
          name: "My Schedule"
          active: true
      register: schedule_create

    - name: Verify schedule creation
      assert:
        that:
          - schedule_create is defined
          - schedule_create.failed is not defined or not schedule_create.failed
          - schedule_create.schedule.name == "My Schedule"

    - name: Show result
      ansible.builtin.debug:
        var: schedule_create

    - name: Log out
      ebdruplab.semaphoreui.logout:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
