- name: Backup Semaphore project into project_deploy vars
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    semaphore_host: "https://semaphore.home.ebdruplab.dk"
    semaphore_port: 443
    ebd_project_name: "Homelab"

  vars_prompt:
    - name: project_backup_semaphore_username
      prompt: "Semaphore username"
      private: false

    - name: project_backup_semaphore_password
      prompt: "Semaphore password"
      private: true

  roles:
    - role: ebdruplab.semaphoreui.project_backup
      vars:
        project_backup_semaphore_host: "{{ semaphore_host }}"
        project_backup_semaphore_port: "{{ semaphore_port }}"
        project_backup_project_name: "{{ ebd_project_name }}"
        project_backup_output_dir: "{{ playbook_dir }}/generated"
        project_backup_output_filename: "generated.project_deploy.yml"
