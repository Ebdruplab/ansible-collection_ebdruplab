---
- name: Test update template
  hosts: localhost
  gather_facts: false
  vars:
    semaphore_host: "http://localhost"
    semaphore_port: 3000
    semaphore_username: "{{ lookup('env', 'ebdruplab_integration_test_USER') | default('admin', true) }}"
    semaphore_password: "{{ lookup('env', 'ebdruplab_integration_test_PW') | default('changeme', true) }}"
    template_update_test_project_name: "template-update-test-project"
  tasks:
    - name: Log in to Semaphore
      ebdruplab.semaphoreui.login:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        username: "{{ semaphore_username }}"
        password: "{{ semaphore_password }}"
      register: login_result

    - name: Create test project
      ebdruplab.semaphoreui.project_create:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        name: "{{ template_update_test_project_name }}"
        alert: false
        alert_chat: ""
        max_parallel_tasks: 0
        demo: false
      register: created_project

    - name: Create key for repository and inventory
      ebdruplab.semaphoreui.project_key_create:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ created_project.project.id }}"
        name: "Template Update Test Key"
        type: "login_password"
        login_password:
          login: "git-user"
          password: "ChangeMe123"
      register: created_key

    - name: Create repository
      ebdruplab.semaphoreui.project_repository_create:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ created_project.project.id }}"
        repository:
          name: "Template Update Test Repository"
          git_url: "https://github.com/example/repo.git"
          git_branch: "main"
          ssh_key_id: "{{ created_key.key.id }}"
      register: created_repository

    - name: Create inventory
      ebdruplab.semaphoreui.project_inventory_create:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ created_project.project.id }}"
        inventory:
          name: "Template Update Test Inventory"
          type: "static"
          inventory: "localhost ansible_connection=local"
          ssh_key_id: "{{ created_key.key.id }}"
      register: created_inventory

    - name: Create a template to update
      ebdruplab.semaphoreui.project_template_create:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ created_project.project.id }}"
        template:
          name: "Test Template"
          playbook: "site.yml"
          inventory_id: "{{ created_inventory.inventory.id }}"
          repository_id: "{{ created_repository.repository.id }}"
          environment_id: null
          description: "Initial Description"
          app: "ansible"
          git_branch: "main"
          type: ""
          arguments: "[]"
          autorun: false
      register: created_template

    - name: Update the template
      ebdruplab.semaphoreui.project_template_update:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ created_project.project.id }}"
        template_id: "{{ created_template.template.id }}"
        template:
          name: "Updated Template"
          playbook: "deploy.yml"
          inventory_id: "{{ created_inventory.inventory.id }}"
          repository_id: "{{ created_repository.repository.id }}"
          environment_id: null
          description: "Updated Description"
          app: "ansible"
          git_branch: "main"
          type: ""
          arguments: "[]"
          autorun: true
          survey_vars:
            - name: "target_env"
              title: "Target environment"
              type: "enum"
              required: true
              values:
                - { name: "dev",  value: "dev" }
                - { name: "prod", value: "prod" }
      register: update_result

    - name: Show update result
      ansible.builtin.debug:
        var: update_result

    - name: Delete template
      ebdruplab.semaphoreui.project_template_delete:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ created_project.project.id }}"
        template_id: "{{ created_template.template.id }}"

    - name: Delete inventory
      ebdruplab.semaphoreui.project_inventory_delete:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ created_project.project.id }}"
        inventory_id: "{{ created_inventory.inventory.id }}"

    - name: Delete repository
      ebdruplab.semaphoreui.project_repository_delete:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ created_project.project.id }}"
        repository_id: "{{ created_repository.repository.id }}"

    - name: Delete key
      ebdruplab.semaphoreui.project_key_delete:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ created_project.project.id }}"
        key_id: "{{ created_key.key.id }}"

    - name: Delete project
      ebdruplab.semaphoreui.project_delete:
        host: "{{ semaphore_host }}"
        port: "{{ semaphore_port }}"
        session_cookie: "{{ login_result.session_cookie }}"
        project_id: "{{ created_project.project.id }}"
