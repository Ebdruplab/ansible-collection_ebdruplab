# roles/project_deploy/tasks/integrations.yml
---
- name: "List Project Integrations"
  ebdruplab.semaphoreui.project_integration_list:
    host: "{{ project_deploy_semaphore_host }}"
    port: "{{ project_deploy_semaphore_port }}"
    api_token: "{{ project_deploy_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ current_project_id }}"
  register: _int_list
  tags:
    - project_deploy
    - integrations
    - list

- name: "Build Maps: integrations_by_name & integrations_by_name_full"
  ansible.builtin.set_fact:
    integrations_by_name: >-
      {{
        dict(
          (_int_list.integrations | default([])) | map(attribute='name') | list
          | zip((_int_list.integrations | default([])) | map(attribute='id') | list)
        )
      }}
    integrations_by_name_full: >-
      {{
        dict(
          (_int_list.integrations | default([])) | map(attribute='name') | list
          | zip((_int_list.integrations | default([])) | list)
        )
      }}
  tags:
    - project_deploy
    - integrations
    - facts

- name: "List Project Templates (for integration template_id resolution)"
  ebdruplab.semaphoreui.project_template_list:
    host: "{{ project_deploy_semaphore_host }}"
    port: "{{ project_deploy_semaphore_port }}"
    api_token: "{{ project_deploy_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ current_project_id }}"
  register: _tpl_list_for_integrations
  tags:
    - project_deploy
    - integrations
    - list

- name: "Build Map: templates_by_name_api"
  ansible.builtin.set_fact:
    templates_by_name_api: >-
      {{
        dict(
          (_tpl_list_for_integrations.templates | default([])) | map(attribute='name') | list
          | zip((_tpl_list_for_integrations.templates | default([])) | map(attribute='id') | list)
        )
      }}
  tags:
    - project_deploy
    - integrations
    - facts

- name: "Build Map: templates_by_name_created (from earlier tasks)"
  ansible.builtin.set_fact:
    templates_by_name_created: >-
      {{
        created_templates_by_name is defined
          | ternary(
              dict(
                (created_templates_by_name | default({})) | dict2items | map(attribute='key') | list
                | zip((created_templates_by_name | default({})) | dict2items | map(attribute='value') | map(attribute='id') | list)
              ),
              {}
            )
      }}
  tags:
    - project_deploy
    - integrations
    - facts

- name: "Combine Template Maps"
  ansible.builtin.set_fact:
    templates_by_name_all: "{{ (templates_by_name_created | default({})) | combine(templates_by_name_api | default({})) }}"
  tags:
    - project_deploy
    - integrations
    - facts

- name: "Compute Desired Integrations List (backwards compatible)"
  ansible.builtin.set_fact:
    _desired_integrations: "{{ project_deploy_config.integrations | default({}) | dict2items | map(attribute='value') | list }}"
  tags:
    - project_deploy
    - integrations
    - facts

- name: "Update Project Integration By Name (resolve template & secret by id or name)"
  ebdruplab.semaphoreui.project_integration_update:
    host: "{{ project_deploy_semaphore_host }}"
    port: "{{ project_deploy_semaphore_port }}"
    api_token: "{{ project_deploy_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ current_project_id }}"
    integration_id: "{{ integrations_by_name[item.name] | int }}"
    integration:
      name: "{{ item.name }}"
      template_id: >-
        {{
          (item.template_id | int)
          if (item.template_id is defined)
          else (
            (templates_by_name_all[item.template_name] | int)
            if (item.template_name is defined and (item.template_name in (templates_by_name_all | default({}))))
            else (integrations_by_name_full[item.name].template_id | int)
          )
        }}
      auth_method: "{{ item.auth_method | default(omit) }}"
      auth_header: "{{ item.auth_header | default(omit) }}"
      auth_secret_id: >-
        {{
          (item.auth_secret_id | int)
          if (item.auth_secret_id is defined)
          else (
            (created_keys_by_name[item.auth_secret_name].id | int)
            if (
              item.auth_secret_name is defined and
              created_keys_by_name is defined and
              (item.auth_secret_name in created_keys_by_name)
            )
            else omit
          )
        }}
      task_params: "{{ item.task_params | default(omit) }}"
  when:
    - project_deploy_force_project_update | bool
    - item.name in (integrations_by_name | default({}))
  loop: "{{ _desired_integrations }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: "{{ project_deploy_sensitive_data_no_log | default(true) | bool }}"
  tags:
    - project_deploy
    - integrations
    - update

- name: "Create Project Integration When Missing (resolve template & secret by id or name)"
  ebdruplab.semaphoreui.project_integration_create:
    host: "{{ project_deploy_semaphore_host }}"
    port: "{{ project_deploy_semaphore_port }}"
    api_token: "{{ project_deploy_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ current_project_id }}"
    integration:
      name: "{{ item.name }}"
      template_id: >-
        {{
          (item.template_id | int)
          if (item.template_id is defined)
          else (
            (templates_by_name_all[item.template_name] | int)
            if (item.template_name is defined and (item.template_name in (templates_by_name_all | default({}))))
            else omit
          )
        }}
      auth_method: "{{ item.auth_method | default(omit) }}"
      auth_header: "{{ item.auth_header | default(omit) }}"
      auth_secret_id: >-
        {{
          (item.auth_secret_id | int)
          if (item.auth_secret_id is defined)
          else (
            (created_keys_by_name[item.auth_secret_name].id | int)
            if (
              item.auth_secret_name is defined and
              created_keys_by_name is defined and
              (item.auth_secret_name in created_keys_by_name)
            )
            else omit
          )
        }}
      task_params: "{{ item.task_params | default(omit) }}"
  when:
    - item.name not in (integrations_by_name | default({}))
    - >
      (item.template_id is defined)
      or (item.template_name is defined and (item.template_name in (templates_by_name_all | default({}))))
  loop: "{{ _desired_integrations }}"
  loop_control:
    label: "{{ item.name }}"
  register: _created_integrations
  no_log: "{{ project_deploy_sensitive_data_no_log | default(true) | bool }}"
  tags:
    - project_deploy
    - integrations
    - create

- name: "Prune Project Integrations not in YAML"
  ebdruplab.semaphoreui.project_integration_delete:
    host: "{{ project_deploy_semaphore_host }}"
    port: "{{ project_deploy_semaphore_port }}"
    api_token: "{{ project_deploy_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ current_project_id }}"
    integration_id: "{{ item.id }}"
  when:
    - project_deploy_variable_delete | default(false) | bool
    - item.name not in (_desired_integrations | map(attribute='name') | list)
  loop: "{{ _int_list.integrations | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  tags:
    - project_deploy
    - integrations
    - prune

- name: "Refresh Project Integrations List"
  ebdruplab.semaphoreui.project_integration_list:
    host: "{{ project_deploy_semaphore_host }}"
    port: "{{ project_deploy_semaphore_port }}"
    api_token: "{{ project_deploy_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ current_project_id }}"
  register: _int_list_after
  tags:
    - project_deploy
    - integrations
    - list

- name: "Build Map: integrations_by_name_after"
  ansible.builtin.set_fact:
    integrations_by_name_after: >-
      {{
        dict(
          (_int_list_after.integrations | default([])) | map(attribute='name') | list
          | zip((_int_list_after.integrations | default([])) | map(attribute='id') | list)
        )
      }}
  tags:
    - project_deploy
    - integrations
    - facts

- name: "Normalize Newly Created Integrations To Final Update Shape"
  ebdruplab.semaphoreui.project_integration_update:
    host: "{{ project_deploy_semaphore_host }}"
    port: "{{ project_deploy_semaphore_port }}"
    api_token: "{{ project_deploy_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ current_project_id }}"
    integration_id: "{{ integrations_by_name_after[item.name] | int }}"
    integration:
      name: "{{ item.name }}"
      template_id: >-
        {{
          (item.template_id | int)
          if (item.template_id is defined)
          else (
            (templates_by_name_all[item.template_name] | int)
            if (item.template_name is defined and (item.template_name in (templates_by_name_all | default({}))))
            else omit
          )
        }}
      auth_method: "{{ item.auth_method | default(omit) }}"
      auth_header: "{{ item.auth_header | default(omit) }}"
      auth_secret_id: >-
        {{
          (item.auth_secret_id | int)
          if (item.auth_secret_id is defined)
          else (
            (created_keys_by_name[item.auth_secret_name].id | int)
            if (
              item.auth_secret_name is defined and
              created_keys_by_name is defined and
              (item.auth_secret_name in created_keys_by_name)
            )
            else omit
          )
        }}
      task_params: "{{ item.task_params | default(omit) }}"
  when:
    - item.name in (integrations_by_name_after | default({}))
    - item.name not in (integrations_by_name | default({}))
  loop: "{{ _desired_integrations }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: "{{ project_deploy_sensitive_data_no_log | default(true) | bool }}"
  tags:
    - project_deploy
    - integrations
    - normalize

- name: "List existing extraction values for integrations with extraction configuration"
  ebdruplab.semaphoreui.project_integration_extraction_value_list:
    host: "{{ project_deploy_semaphore_host }}"
    port: "{{ project_deploy_semaphore_port }}"
    api_token: "{{ project_deploy_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ current_project_id }}"
    integration_id: "{{ integrations_by_name_after[item.name] | int }}"
  when:
    - item.name is defined
    - item.name in (integrations_by_name_after | default({}))
    - (item.extraction_values | default([])) | length > 0
  loop: "{{ _desired_integrations }}"
  loop_control:
    label: "{{ item.name }}"
  register: _integration_extraction_value_lists
  tags:
    - project_deploy
    - integrations
    - extractions
    - list

- name: "Build extraction value map by integration name"
  ansible.builtin.set_fact:
    integration_extraction_values_by_integration_name: >-
      {{
        (integration_extraction_values_by_integration_name | default({}))
        | combine({
            item.item.name: (item.extracted_values | default([]))
          })
      }}
  loop: "{{ _integration_extraction_value_lists.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  tags:
    - project_deploy
    - integrations
    - extractions
    - facts

- name: "Update Integration Extraction Values when they already exist by name"
  ebdruplab.semaphoreui.project_integration_extraction_value_update:
    host: "{{ project_deploy_semaphore_host }}"
    port: "{{ project_deploy_semaphore_port }}"
    api_token: "{{ project_deploy_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ current_project_id }}"
    integration_id: "{{ integrations_by_name_after[item.0.name] | int }}"
    extractvalue_id: >-
      {{
        (
          (
            integration_extraction_values_by_integration_name[item.0.name] | default([])
          )
          | selectattr('name', 'equalto', item.1.name)
          | list
          | first
        ).id | int
      }}
    value:
      name: "{{ item.1.name }}"
      key: "{{ item.1.key | default(item.1.value) }}"
      value_source: "{{ item.1.value_source }}"
      body_data_type: "{{ item.1.body_data_type | default('json') }}"
      variable_type: "{{ item.1.variable_type }}"
      variable: "{{ item.1.variable }}"
  when:
    - item.0.name is defined
    - item.0.name in (integrations_by_name_after | default({}))
    - (item.0.extraction_values | default([])) | length > 0
    - (item.1.key is defined) or (item.1.value is defined)
    - >
      (
        integration_extraction_values_by_integration_name[item.0.name] | default([])
        | selectattr('name', 'equalto', item.1.name)
        | list
        | length
      ) > 0
    - >
      (
        (
          integration_extraction_values_by_integration_name[item.0.name] | default([])
          | selectattr('name', 'equalto', item.1.name)
          | list
          | first
        ).key | default('')
      ) != (item.1.key | default(item.1.value))
      or
      (
        (
          integration_extraction_values_by_integration_name[item.0.name] | default([])
          | selectattr('name', 'equalto', item.1.name)
          | list
          | first
        ).value_source | default('')
      ) != (item.1.value_source | string)
      or
      (
        (
          integration_extraction_values_by_integration_name[item.0.name] | default([])
          | selectattr('name', 'equalto', item.1.name)
          | list
          | first
        ).body_data_type | default('json')
      ) != (item.1.body_data_type | default('json'))
      or
      (
        (
          integration_extraction_values_by_integration_name[item.0.name] | default([])
          | selectattr('name', 'equalto', item.1.name)
          | list
          | first
        ).variable | default('')
      ) != (item.1.variable | string)
      or
      (
        (
          integration_extraction_values_by_integration_name[item.0.name] | default([])
          | selectattr('name', 'equalto', item.1.name)
          | list
          | first
        ).variable_type | default('')
      ) != (item.1.variable_type | string)
  loop: "{{ _desired_integrations | subelements('extraction_values', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} :: {{ item.1.name }}"
  no_log: "{{ project_deploy_sensitive_data_no_log | default(true) | bool }}"
  tags:
    - project_deploy
    - integrations
    - extractions
    - update

# IMPORTANT: project_integration_extraction_value_create expects a DICT argument named "value"
# (not a scalar, and not "extraction_value"). The dict should match the API shape.
# Backwards compatible: allow "key" or "value" in vars; map to API "key".
- name: "Create Integration Extraction Values when missing by name"
  ebdruplab.semaphoreui.project_integration_extraction_value_create:
    host: "{{ project_deploy_semaphore_host }}"
    port: "{{ project_deploy_semaphore_port }}"
    api_token: "{{ project_deploy_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ current_project_id }}"
    integration_id: "{{ integrations_by_name_after[item.0.name] | int }}"
    value:
      name: "{{ item.1.name }}"
      key: "{{ item.1.key | default(item.1.value) }}"
      value_source: "{{ item.1.value_source }}"
      variable_type: "{{ item.1.variable_type }}"
      variable: "{{ item.1.variable }}"
  when:
    - item.0.name is defined
    - item.0.name in (integrations_by_name_after | default({}))
    - (item.0.extraction_values | default([])) | length > 0
    - (item.1.key is defined) or (item.1.value is defined)
    - >
      (
        integration_extraction_values_by_integration_name[item.0.name] | default([])
        | selectattr('name', 'equalto', item.1.name)
        | list
        | length
      ) == 0
  loop: "{{ _desired_integrations | subelements('extraction_values', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} :: {{ item.1.name }}"
  no_log: "{{ project_deploy_sensitive_data_no_log | default(true) | bool }}"
  tags:
    - project_deploy
    - integrations
    - extractions
    - create

- name: "Set Created Integrations Fact"
  ansible.builtin.set_fact:
    created_integrations_by_name: >-
      {{
        dict(
          (_int_list_after.integrations | default([])) | map(attribute='name') | list
          | zip((_int_list_after.integrations | default([])))
        )
      }}
  tags:
    - project_deploy
    - integrations
    - facts
