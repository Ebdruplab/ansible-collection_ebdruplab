---
- name: "Test | Deploy Semaphore project from generated backup vars"
  hosts: localhost
  gather_facts: false

  vars:
    _backup_dir: "{{ playbook_dir }}/backup/generated_vars"

    # Point to the generated vars file you want to deploy
    # (replace with the real filename produced by the backup play)
    project_backup_vars_file: "{{ _backup_dir }}/YOUR_BACKUP_FILENAME.vars.yml"

    project_backup_vars_root_key: "semaphore_project_backup"

  vars_files:
    - "vars/example_vars.yml"

  tasks:
    - name: "Preflight | Ensure backup vars file exists"
      ansible.builtin.stat:
        path: "{{ project_backup_vars_file }}"
      register: _backup_vars_file_stat
      tags:
        - preflight

    - name: "Preflight | Fail when backup vars file is missing"
      ansible.builtin.fail:
        msg: "Backup vars file not found: {{ project_backup_vars_file }}"
      when: not _backup_vars_file_stat.stat.exists
      tags:
        - preflight

    - name: "Load | Read backup vars file"
      ansible.builtin.set_fact:
        _backup_vars_loaded: "{{ lookup('file', project_backup_vars_file) | from_yaml }}"
      tags:
        - preflight

    - name: "Resolve | Select backup root tree for project_deploy"
      ansible.builtin.set_fact:
        _project_deploy_from_backup: "{{ _backup_vars_loaded[project_backup_vars_root_key] | default(omit) }}"
      tags:
        - preflight

    - name: "Assert | Backup root key exists in loaded vars"
      ansible.builtin.assert:
        that:
          - _project_deploy_from_backup is defined
          - _project_deploy_from_backup is mapping
        fail_msg: >-
          Backup vars not loaded or unexpected structure.
          Ensure your generated vars file contains the root key '{{ project_backup_vars_root_key }}'.
      tags:
        - preflight

    - name: "Deploy | Recreate project from backup vars"
      ansible.builtin.include_role:
        name: "ebdruplab.semaphoreui.project_deploy"
      vars:
        project_deploy_config: "{{ _project_deploy_from_backup }}"
      tags:
        - deploy

