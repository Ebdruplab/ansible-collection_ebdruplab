---
- name: "Test | Backup Semaphore project and generate vars locally"
  hosts: localhost
  gather_facts: false

  vars_files:
    - "vars/example_vars.yml"

  vars:
    _backup_dir: "{{ playbook_dir }}/backup/generated_vars"

    project_backup_output_dir: "{{ _backup_dir }}"
    project_backup_output_prefix: "semaphore_project"
    project_backup_write_raw_json: true
    project_backup_write_vars_yaml: true
    project_backup_vars_layout: "single"
    project_backup_vars_root_key: "semaphore_project_backup"

    # Choose ONE of these selectors:
    project_backup_project_name: "{{ project_deploy_config.project.name }}"
    # project_backup_project_id: 1
    project_backup_sensitive_data_no_log: false

  tasks:
    - name: "Ensure local backup directory exists"
      ansible.builtin.file:
        path: "{{ _backup_dir }}"
        state: "directory"
        mode: "0750"
      tags:
        - preflight

    - name: "Run project backup role"
      ansible.builtin.include_role:
        name: "ebdruplab.semaphoreui.project_backup"
      tags:
        - backup
