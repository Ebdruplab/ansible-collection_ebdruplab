---
- name: "Vars | Ensure vars files directory exists"
  ansible.builtin.file:
    path: "{{ project_backup_output_dir }}/{{ project_backup_vars_files_dirname }}"
    state: "directory"
    mode: "0750"
  tags:
    - vars
    - output
    - project_backup

- name: "Vars | Write split vars YAML files (no filter plugin required)"
  ansible.builtin.template:
    src: "vars_section.yml.j2"
    dest: "{{ project_backup_output_dir }}/{{ project_backup_vars_files_dirname }}/{{ item.filename }}"
    mode: "0640"
  vars:
    _pb_root_key: "{{ project_backup_vars_root_key }}"
    _pb_section_key: "{{ item.key }}"
    _pb_data: "{{ _project_backup_export_obj[item.key] | default(item.default) }}"
    _pb_scrub: "{{ project_backup_scrub_secrets | default(true) | bool }}"
    _pb_vault_prefix: "{{ project_backup_vault_var_prefix | default('vault') }}"
    _pb_secret_exact: "{{ project_backup_secret_keys_exact | default([]) }}"
    _pb_secret_regex: "{{ project_backup_secret_keys_regex | default([]) }}"
  loop:
    - key: "meta"
      filename: "meta.yml"
      default: {}
    - key: "keys"
      filename: "keys.yml"
      default: {}
    - key: "repositories"
      filename: "repositories.yml"
      default: []
    - key: "inventories"
      filename: "inventories.yml"
      default: {}
    - key: "environments"
      filename: "environments.yml"
      default: {}
    - key: "templates"
      filename: "templates.yml"
      default: {}
    - key: "schedules"
      filename: "schedules.yml"
      default: {}
    - key: "views"
      filename: "views.yml"
      default: {}
    - key: "integrations"
      filename: "integrations.yml"
      default: {}
    - key: "integration_aliases"
      filename: "integration_aliases.yml"
      default: []
    - key: "secret_storages"
      filename: "secret_storages.yml"
      default: []
  no_log: "{{ project_backup_sensitive_data_no_log }}"
  tags:
    - vars
    - output
    - project_backup
