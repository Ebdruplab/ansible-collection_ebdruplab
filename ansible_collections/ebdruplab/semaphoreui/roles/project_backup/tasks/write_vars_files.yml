---
- name: "Vars | Ensure vars files directory exists"
  ansible.builtin.file:
    path: "{{ project_backup_output_dir }}/{{ project_backup_vars_files_dirname }}"
    state: "directory"
    mode: "0750"
  tags:
    - vars
    - output
    - project_backup

- name: "Vars | Write split vars YAML files"
  ansible.builtin.copy:
    dest: "{{ project_backup_output_dir }}/{{ project_backup_vars_files_dirname }}/{{ item.filename }}"
    content: >-
      {{
        {
          project_backup_vars_root_key: {
            item.key: (_project_backup_export_obj[item.key] | default(item.default))
          }
        } | project_backup_scrub_secrets | to_nice_yaml(indent=2, width=9999)
      }}
    mode: "0640"
  loop:
    - key: "meta"
      filename: "meta.yml"
      default: {}
    - key: "keys"
      filename: "keys.yml"
      default: {}
    - key: "repositories"
      filename: "repositories.yml"
      default: []
    - key: "inventories"
      filename: "inventories.yml"
      default: {}
    - key: "environments"
      filename: "environments.yml"
      default: {}
    - key: "templates"
      filename: "templates.yml"
      default: {}
    - key: "schedules"
      filename: "schedules.yml"
      default: {}
    - key: "views"
      filename: "views.yml"
      default: {}
    - key: "integrations"
      filename: "integrations.yml"
      default: {}
    - key: "integration_aliases"
      filename: "integration_aliases.yml"
      default: []
    - key: "secret_storages"
      filename: "secret_storages.yml"
      default: []
  no_log: "{{ project_backup_sensitive_data_no_log }}"
  tags:
    - vars
    - output
    - project_backup
