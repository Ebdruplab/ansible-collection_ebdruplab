---
- name: "Vars | Build vars tree"
  ansible.builtin.set_fact:
    _project_backup_vars_tree: "{{ { (project_backup_vars_root_key): _project_backup_export_obj } }}"
  no_log: "{{ project_backup_sensitive_data_no_log }}"
  tags:
    - vars
    - project_backup

- name: "Vars | Write vars YAML (single) (no filter plugin required)"
  ansible.builtin.template:
    src: "vars_single.yml.j2"
    dest: "{{ project_backup_output_dir }}/{{ project_backup_vars_filename }}"
    mode: "0640"
  vars:
    _pb_root_key: "{{ project_backup_vars_root_key }}"
    _pb_data: "{{ _project_backup_export_obj }}"
    _pb_scrub: "{{ project_backup_scrub_secrets | default(true) | bool }}"
    _pb_vault_prefix: "{{ project_backup_vault_var_prefix | default('vault') }}"
    _pb_secret_exact: "{{ project_backup_secret_keys_exact | default([]) }}"
    _pb_secret_regex: "{{ project_backup_secret_keys_regex | default([]) }}"
  no_log: "{{ project_backup_sensitive_data_no_log }}"
  tags:
    - vars
    - output
    - project_backup
