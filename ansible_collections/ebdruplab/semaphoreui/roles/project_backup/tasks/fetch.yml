- name: "List environments"
  ebdruplab.semaphoreui.project_environment_list:
    host: "{{ project_backup_semaphore_host }}"
    port: "{{ project_backup_semaphore_port }}"
    api_token: "{{ project_backup_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ project_backup_project_id }}"
  register: _environments
  tags:
    - environments
    - list

- name: "Get environment details"
  ebdruplab.semaphoreui.project_environment_get:
    host: "{{ project_backup_semaphore_host }}"
    port: "{{ project_backup_semaphore_port }}"
    api_token: "{{ project_backup_semaphore_api_token | default(omit) }}"
    session_cookie: "{{ login_result.session_cookie | default(omit) }}"
    project_id: "{{ project_backup_project_id }}"
    environment_id: "{{ item.id }}"
  loop: "{{ _environments.environments | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  register: _environment_detail_results
  when: (_environments.environments | default([])) | length > 0
  tags:
    - environments
    - get

