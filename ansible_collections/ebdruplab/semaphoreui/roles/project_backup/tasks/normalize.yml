# roles/project_backup/tasks/normalize.yml
---
- name: "Normalize | Initialize working facts"
  ansible.builtin.set_fact:
    project_backup_generated_vault_variables: []
    _integration_extraction_values_by_name: {}
    _users_access_norm: []
    _keys_norm: []
    _repos_norm: []
    _invs_norm: []
    _envs_norm: []
    _tpls_norm: []
    _sched_norm: []
    _int_norm: []
  no_log: "{{ project_backup_sensitive_data_no_log | default(true) | bool }}"
  tags:
    - normalize

- name: "Normalize | Extract list payloads safely"
  ansible.builtin.set_fact:
    _users_access_list: "{{ _users_access['users'] | default([]) }}"
    _keys_list: "{{ _keys['keys'] | default([]) }}"
    _repos_list: "{{ _repositories['repositories'] | default([]) }}"
    _views_list: "{{ _views['views'] | default([]) }}"
    _inventories_list: "{{ _inventories['inventories'] | default([]) }}"
    _environments_list: >-
      {{
        (
          _environment_detail_results.results | default([])
          | selectattr('environment', 'defined')
          | map(attribute='environment')
          | list
        )
        if ((_environment_detail_results.results | default([]) | length) > 0)
        else (_environments['environments'] | default([]))
      }}
    _templates_list: "{{ _templates['templates'] | default([]) }}"
    _schedules_list: "{{ _schedules['schedules'] | default([]) }}"
    _integrations_list: "{{ _integrations['integrations'] | default([]) }}"
  tags:
    - normalize

- name: "Normalize | Group extraction values by integration name"
  ansible.builtin.set_fact:
    _integration_extraction_values_by_name: >-
      {{
        _integration_extraction_values_by_name | combine({
          item.item.name: (
            item.extracted_values | default([]) | unique(attribute='name') | sort(attribute='name')
          )
        })
      }}
  loop: "{{ _integration_extraction_value_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  tags:
    - normalize
    - integrations
    - extraction_values

- name: "Normalize | Users access -> project_deploy format (username/role)"
  ansible.builtin.set_fact:
    _users_access_norm: "{{ _users_access_norm | default([]) + [ _ua_item ] }}"
  vars:
    _ua_item:
      username: "{{ item.username }}"
      role: "{{ (item.role | default('Owner')) | regex_replace('^owner$', 'Owner') | regex_replace('^Owner$', 'Owner') }}"
  loop: "{{ _users_access_list | default([]) }}"
  loop_control:
    label: "{{ item.username | default('') }}"
  when: item.username is defined
  tags:
    - normalize
    - users_access

- name: "Normalize | Build id->name maps"
  ansible.builtin.set_fact:
    _key_name_by_id: "{{ dict((_keys_list | map(attribute='id') | list) | zip(_keys_list | map(attribute='name') | list)) }}"
    _repo_name_by_id: "{{ dict((_repos_list | map(attribute='id') | list) | zip(_repos_list | map(attribute='name') | list)) }}"
    _inv_name_by_id: "{{ dict((_inventories_list | map(attribute='id') | list) | zip(_inventories_list | map(attribute='name') | list)) }}"
    _env_name_by_id: "{{ dict((_environments_list | map(attribute='id') | list) | zip(_environments_list | map(attribute='name') | list)) }}"
    _view_title_by_id: "{{ dict((_views_list | map(attribute='id') | list) | zip(_views_list | map(attribute='title') | list)) }}"
    _tpl_name_by_id: "{{ dict((_templates_list | map(attribute='id') | list) | zip(_templates_list | map(attribute='name') | list)) }}"
  tags:
    - normalize

- name: "Normalize | Keys: replace secret values with vault placeholders"
  ansible.builtin.include_tasks:
    file: "normalize_key_item.yml"
  loop: "{{ _keys_list }}"
  loop_control:
    label: "{{ item.name | default('') }}"
  no_log: "{{ project_backup_sensitive_data_no_log | default(true) | bool }}"
  tags:
    - normalize
    - keys

- name: "Normalize | Environments: convert env/json and replace secrets with vault placeholders"
  ansible.builtin.include_tasks:
    file: "normalize_environment_item.yml"
  loop: "{{ _environments_list }}"
  loop_control:
    loop_var: env_item
    label: "{{ env_item.name | default('') }}"
  no_log: "{{ project_backup_sensitive_data_no_log | default(true) | bool }}"
  tags:
    - normalize
    - environments

- name: "Normalize | Repositories: add key_name (ssh_key_id -> name)"
  ansible.builtin.set_fact:
    _repos_norm: "{{ _repos_norm | default([]) + [ _repo_item ] }}"
  vars:
    _repo_item: >-
      {{
        item
        | combine(
            { 'key_name': (_key_name_by_id[item.ssh_key_id] | default(omit)) },
            recursive=True
          )
      }}
  loop: "{{ _repos_list }}"
  loop_control:
    label: "{{ item.name | default('') }}"
  tags:
    - normalize
    - repositories

- name: "Normalize | Inventories: convert *_id references to *_name fields"
  ansible.builtin.set_fact:
    _invs_norm: "{{ _invs_norm | default([]) + [ _inv_item ] }}"
  vars:
    _inv_item: >-
      {{
        item
        | combine(
            {
              'ssh_key_name': (_key_name_by_id[item.ssh_key_id] | default(omit)),
              'become_key_name': (_key_name_by_id[item.become_key_id] | default(omit)),
              'repository_name': (_repo_name_by_id[item.repository_id] | default(omit)),
              'inventory_file': (
                ((item.type | default('')) == 'file')
                  | ternary(item.inventory, omit)
              )
            },
            recursive=True
          )
      }}
  loop: "{{ _inventories_list }}"
  loop_control:
    label: "{{ item.name | default('') }}"
  tags:
    - normalize
    - inventories

- name: "Normalize | Templates: convert *_id references to *_name fields and parse arguments"
  ansible.builtin.set_fact:
    _tpls_norm: "{{ _tpls_norm | default([]) + [ _tpl_item ] }}"
  vars:
    _tpl_item: >-
      {{
        item
        | combine(
            {
              'inventory_name': (_inv_name_by_id[item.inventory_id] | default(omit)),
              'repository_name': (_repo_name_by_id[item.repository_id] | default(omit)),
              'environment_name': (_env_name_by_id[item.environment_id] | default(omit)),
              'view_title': (_view_title_by_id[item.view_id] | default(omit)),
              'arguments': (
                (item.arguments is string)
                  | ternary(item.arguments | from_json, (item.arguments | default([])))
              )
            },
            recursive=True
          )
      }}
  loop: "{{ _templates_list }}"
  loop_control:
    label: "{{ item.name | default('') }}"
  tags:
    - normalize
    - templates

- name: "Normalize | Schedules: template_id -> template_name; arguments -> list"
  ansible.builtin.set_fact:
    _sched_norm: "{{ _sched_norm | default([]) + [ _sched_item ] }}"
  vars:
    _tpl_id: "{{ item.template_id | default(omit) }}"
    _tpl_name_resolved: >-
      {{
        (_tpl_id is not undefined and _tpl_id is not none)
          | ternary((_tpl_name_by_id[_tpl_id] | default(omit)), omit)
      }}
    _args_raw: "{{ item.arguments | default([]) }}"
    _args_list: "{{ _args_raw if (_args_raw is not string) else (_args_raw | from_json) }}"
    _sched_item: >-
      {{
        item
        | combine(
            {
              'template_name': (_tpl_name_resolved | default(item.tpl_name | default(omit))),
              'arguments': (_args_list | default([]))
            },
            recursive=True
          )
      }}
  loop: "{{ _schedules_list }}"
  loop_control:
    label: "{{ item.name | default('') }}"
  tags:
    - normalize
    - schedules

- name: "Normalize | Integrations: template_id/auth_secret_id -> names"
  ansible.builtin.set_fact:
    _int_norm: "{{ _int_norm | default([]) + [ _int_item ] }}"
  vars:
    _int_item: >-
      {{
        item
        | combine(
            {
              'template_name': (_tpl_name_by_id[item.template_id] | default(omit)),
              'auth_secret_name': (_key_name_by_id[item.auth_secret_id] | default(omit)),
              'extraction_values': (_integration_extraction_values_by_name[item.name] | default(omit))
            },
            recursive=True
          )
      }}
  loop: "{{ _integrations_list }}"
  loop_control:
    label: "{{ item.name | default('') }}"
  tags:
    - normalize
    - integrations
