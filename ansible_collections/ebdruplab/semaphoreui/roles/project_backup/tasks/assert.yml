---
- name: "Assert | Validate project selection variables"
  ansible.builtin.assert:
    that:
      - (project_backup_project_id | int > 0) or (project_backup_project_name | string | length > 0)
    fail_msg: "You must set either project_backup_project_id (>0) OR project_backup_project_name."
  tags:
    - assert
    - backup

- name: "Assert | Validate output variables"
  ansible.builtin.assert:
    that:
      - project_backup_output_dir | string | length > 0
      - project_backup_output_prefix | string | length > 0
      - project_backup_vars_layout in ['single', 'files']
      - project_backup_vars_root_key | string | length > 0
      - project_backup_vars_files_dirname | string | length > 0
    fail_msg: "Invalid output/vars variables."
  tags:
    - assert
    - backup

- name: "Assert | Validate plugin/module FQCNs are configured"
  ansible.builtin.assert:
    that:
      - project_backup_projects_info_module is defined
      - project_backup_projects_info_module | string | length > 0
      - project_backup_project_backup_module is defined
      - project_backup_project_backup_module | string | length > 0
    fail_msg: >-
      Missing required module FQCN variables.
      Define:
      - project_backup_projects_info_module (list projects)
      - project_backup_project_backup_module (GET /project/{id}/backup)
  tags:
    - assert
    - backup
