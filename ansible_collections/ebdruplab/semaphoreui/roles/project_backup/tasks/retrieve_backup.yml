---
- name: "Retrieve | Run Semaphore project backup (collection module)"
  ebdruplab.semaphoreui.project_backup:
    semaphore_host: "{{ project_backup_semaphore_host }}"
    semaphore_port: "{{ project_backup_semaphore_port }}"
    semaphore_api_token: "{{ project_backup_semaphore_api_token }}"
    project_id: "{{ project_backup_project_id }}"
  register: project_backup_result
  no_log: "{{ project_backup_sensitive_data_no_log }}"
  tags:
    - retrieve_backup
    - backup

- name: "Retrieve | Assert that project backup succeeded"
  ansible.builtin.assert:
    that:
      - project_backup_result is defined
      - (project_backup_result.failed | default(false)) == false
      - (project_backup_result.status | default(0)) | int == 200
      - project_backup_result.backup is defined
      - project_backup_result.backup is mapping
    fail_msg: "Project backup failed or returned unexpected data."
  tags:
    - retrieve_backup
    - backup

- name: "Retrieve | Normalize export object"
  ansible.builtin.set_fact:
    _project_backup_export_obj: "{{ project_backup_result.backup }}"
  no_log: "{{ project_backup_sensitive_data_no_log }}"
  tags:
    - retrieve_backup
    - backup

