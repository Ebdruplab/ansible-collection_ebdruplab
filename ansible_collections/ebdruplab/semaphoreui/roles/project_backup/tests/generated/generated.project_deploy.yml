project_backup_vault_variables:
- ansible_vault_CI_TRIGGER_TOKEN_PASSWORD
- ansible_vault_CI_TRIGGER_TOKEN_SECONDARY_PASSWORD
- ansible_vault_EBDRUPLAB_EXAMPLE_SSH_KEY_PRIVATE_KEY
- ansible_vault_EBDRUPLAB_EXAMPLE_USER_PASSWORD
- ansible_vault_PROJECT_VAULT_PASSWORD_PASSWORD
- ansible_vault_TEST_ENVIRONMENT_API_TOKEN_SECRET
- ansible_vault_TEST_ENVIRONMENT_DB_PASSWORD_SECRET
- ansible_vault_TEST_ENVIRONMENT_PASSWORD
project_deploy_config:
  environments:
    Empty:
      env: {}
      json: {}
      name: Empty
      secrets: []
    Test Environment:
      env:
        KEY: value
      json:
        foo: bar
      name: Test Environment
      password: '{{ ansible_vault_TEST_ENVIRONMENT_PASSWORD }}'
      secrets:
      - name: api_token
        secret: '{{ ansible_vault_TEST_ENVIRONMENT_API_TOKEN_SECRET }}'
        type: json
      - name: DB_PASSWORD
        secret: '{{ ansible_vault_TEST_ENVIRONMENT_DB_PASSWORD_SECRET }}'
        type: env
  integrations:
    CI Token Trigger:
      auth_header: ''
      auth_method: token
      auth_secret_name: CI Trigger Token
      extraction_values: []
      name: CI Token Trigger
      task_params:
        debug_level: 4
        diff: false
        dry_run: false
        environment: null
        params: null
      template_name: Deploy Service
    CI Token Trigger (Secondary):
      auth_header: ''
      auth_method: token
      auth_secret_name: CI Trigger Token Secondary
      extraction_values:
      - body_data_type: json
        key: X-Branch
        name: Extract Branch
        value_source: header
        variable: git_branch
      - body_data_type: json
        key: X-Commit
        name: Extract Commit
        value_source: header
        variable: git_commit
      name: CI Token Trigger (Secondary)
      task_params:
        debug_level: 4
        diff: false
        dry_run: false
        environment: null
        params: null
      template_name: Deploy Service
  inventories:
    A Local Ini Inventory:
      inventory: localhost ansible_connection=local
      name: A Local Ini Inventory
      ssh_key_name: Ebdruplab example ssh key
      type: static
    A Yaml Inventory:
      inventory: "all:\n  hosts:\n    localhost:\n      ansible_connection: local\n"
      name: A Yaml Inventory
      ssh_key_name: Ebdruplab example ssh key
      type: static-yaml
    A repository Inventory:
      become_key_name: Ebdruplab example ssh key
      inventory_file: inventories/example/example.ini
      name: A repository Inventory
      repository_name: Repositorie Ebdruplab Demo
      ssh_key_name: Ebdruplab example ssh key
      type: file
  keys:
    CI Trigger Token:
      login_password:
        login: CHANGE_ME_LOGIN
        password: '{{ ansible_vault_CI_TRIGGER_TOKEN_PASSWORD }}'
      name: CI Trigger Token
      override_secret: false
      type: login_password
    CI Trigger Token Secondary:
      login_password:
        login: CHANGE_ME_LOGIN
        password: '{{ ansible_vault_CI_TRIGGER_TOKEN_SECONDARY_PASSWORD }}'
      name: CI Trigger Token Secondary
      override_secret: false
      type: login_password
    Ebdruplab Example User:
      login_password:
        login: CHANGE_ME_LOGIN
        password: '{{ ansible_vault_EBDRUPLAB_EXAMPLE_USER_PASSWORD }}'
      name: Ebdruplab Example User
      override_secret: false
      type: login_password
    Ebdruplab example ssh key:
      name: Ebdruplab example ssh key
      override_secret: false
      ssh:
        login: CHANGE_ME_SSH_LOGIN
        private_key: '{{ ansible_vault_EBDRUPLAB_EXAMPLE_SSH_KEY_PRIVATE_KEY }}'
      type: ssh
    Project Vault Password:
      login_password:
        login: CHANGE_ME_LOGIN
        password: '{{ ansible_vault_PROJECT_VAULT_PASSWORD_PASSWORD }}'
      name: Project Vault Password
      override_secret: false
      type: login_password
  project:
    alert: false
    alert_chat: ''
    demo: false
    max_parallel_tasks: '0'
    name: Ebdruplab Example Project
    type: ''
  repositories:
  - git_branch: main
    git_url: https://github.com/Ebdruplab/ansible-semaphore_ebdruplab_examples.git
    key_name: Ebdruplab Example User
    name: Repositorie Ebdruplab Demo
  schedules:
    Hourly Build:
      active: false
      arguments: []
      cron_format: 0 * * * *
      name: Hourly Build
      vaults: []
    Nightly Deploy:
      active: true
      arguments: []
      cron_format: 0 3 * * *
      name: Nightly Deploy
      vaults: []
  templates:
    Build Artifact:
      allow_override_args_in_task: false
      app: ansible
      arguments: []
      autorun: false
      description: Builds the application artifact
      environment_name: Test Environment
      git_branch: null
      inventory_name: A repository Inventory
      name: Build Artifact
      playbook: playbooks/build.yml
      repository_name: Repositorie Ebdruplab Demo
      runner_tag: null
      start_version: 1.0.0.0
      suppress_success_alerts: false
      survey_vars: null
      task_params:
        allow_debug: false
        allow_override_inventory: false
        allow_override_limit: false
        allow_override_skip_tags: false
        allow_override_tags: false
        limit: []
        skip_tags: []
        tags: []
      type: build
      vaults: []
      view_title: ExamplePos_1
    Deploy Service:
      allow_override_args_in_task: false
      app: ansible
      arguments: []
      autorun: false
      description: Deploys the service
      environment_name: Test Environment
      git_branch: release
      inventory_name: A repository Inventory
      name: Deploy Service
      playbook: playbooks/deploy.yml
      repository_name: Repositorie Ebdruplab Demo
      runner_tag: null
      start_version: null
      suppress_success_alerts: false
      survey_vars:
      - description: ''
        name: target_env
        required: true
        title: Target environment
        type: enum
        values:
        - name: dev
          value: dev
        - name: prod
          value: prod
      task_params:
        allow_debug: true
        allow_override_inventory: false
        allow_override_limit: false
        allow_override_skip_tags: false
        allow_override_tags: false
        limit: []
        skip_tags: []
        tags: []
      type: deploy
      vaults: []
      view_title: ExamplePos_1
    Ebdruplab Example Playbook:
      allow_override_args_in_task: true
      app: ansible
      arguments: []
      autorun: false
      description: Runs the example Ansible playbook
      environment_name: Test Environment
      git_branch: main
      inventory_name: A repository Inventory
      name: Ebdruplab Example Playbook
      playbook: playbooks/pb-semaphore-example.yml
      repository_name: Repositorie Ebdruplab Demo
      runner_tag: null
      start_version: null
      suppress_success_alerts: false
      survey_vars:
      - description: ''
        name: release_version
        required: true
        title: Release version
        type: string
        values: null
      - description: The target
        name: targets
        required: true
        title: What is our target?
        type: string
        values: null
      task_params:
        allow_debug: true
        allow_override_inventory: true
        allow_override_limit: true
        allow_override_skip_tags: true
        allow_override_tags: true
        limit: []
        skip_tags: []
        tags: []
      type: ''
      vaults: []
      view_title: ExamplePos_1
    Example Playbook:
      allow_override_args_in_task: true
      app: ansible
      arguments: []
      autorun: false
      description: Runs the example Ansible playbook
      environment_name: Test Environment
      git_branch: main
      inventory_name: A repository Inventory
      name: Example Playbook
      playbook: playbooks/pb-semaphore-example.yml
      repository_name: Repositorie Ebdruplab Demo
      runner_tag: null
      start_version: null
      suppress_success_alerts: false
      survey_vars:
      - description: ''
        name: release_version
        required: true
        title: Release version
        type: string
        values: null
      - description: ''
        name: batch_size
        required: false
        title: Batch size
        type: int
        values: null
      - description: ''
        name: api_key
        required: false
        title: API key
        type: secret
        values: null
      - description: ''
        name: env
        required: true
        title: Environment
        type: enum
        values:
        - name: staging
          value: stg
        - name: production
          value: prod
      task_params:
        allow_debug: true
        allow_override_inventory: true
        allow_override_limit: true
        allow_override_skip_tags: true
        allow_override_tags: true
        limit: []
        skip_tags: []
        tags: []
      type: ''
      vaults: []
      view_title: ExamplePos_1
  users_access:
  - role: Owner
    username: admin
  - role: Owner
    username: ServiceDeskRunner
  views:
    ExamplePos_1:
      position: '1'
      title: ExamplePos_1
    Examples:
      position: '0'
      title: Examples
